# Required secrets:
#   GH_PAT  - GitHub PAT to download artifacts and create releases

name: GitHub Release (Resources)

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'AndroidCelestia build run ID (leave empty for latest)'
        required: false
      branch:
        description: 'Branch'
        required: true
        default: 'develop'
      rc:
        description: 'RC number'
        required: true
        default: '1'

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout release
        uses: actions/checkout@v4

      - name: Resolve Run ID
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "${{ inputs.run_id }}" ]; then
            echo "RESOLVED_RUN_ID=${{ inputs.run_id }}" >> $GITHUB_ENV
          else
            RUN_ID=$(gh api "repos/celestiamobile/AndroidCelestia/actions/workflows/build.yml/runs?branch=${{ inputs.branch }}&status=success&per_page=1" --jq '.workflow_runs[0].id')
            echo "RESOLVED_RUN_ID=$RUN_ID" >> $GITHUB_ENV
          fi

      - name: Download Build
        uses: actions/download-artifact@v4
        with:
          name: apk
          run-id: ${{ env.RESOLVED_RUN_ID }}
          repository: celestiamobile/AndroidCelestia
          github-token: ${{ secrets.GH_PAT }}
          path: '${{ runner.temp }}/apk'

      - name: Set Version and Tag
        run: |
          VERSION=$(curl -s "https://raw.githubusercontent.com/celestiamobile/AndroidCelestia/${{ inputs.branch }}/app/src/main/AndroidManifest.xml" | awk -F'"' '/android.versionName=/ {print $2; exit}')
          TAG=$(echo $VERSION | sed 's/\./_/g')_rc${{ inputs.rc }}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Extract CelestiaResources
        run: unzip -o $RUNNER_TEMP/apk/app-sideload-release-unsigned.apk 'assets/CelestiaResources/*' -d $RUNNER_TEMP/extracted

      - name: Create Archive
        run: |
          cd $RUNNER_TEMP/extracted/assets
          zip -r $RUNNER_TEMP/CelestiaResources${{ env.VERSION }}.zip CelestiaResources

      - name: Update Release Notes
        run: |
          CELESTIA_LOCALIZATION_REPO_COMMIT=$(git ls-remote https://github.com/celestiamobile/CelestiaLocalization ${{ inputs.branch }} | cut -f 1)
          CELESTIA_CONTENT_REPO_COMMIT=$(curl -s "https://raw.githubusercontent.com/celestiamobile/CelestiaUWP/${{ inputs.branch }}/.github/workflows/build.yml" | awk -F"'" '/CONTENT_COMMIT_HASH/ {print $2}')
          echo https://github.com/celestiamobile/CelestiaLocalization/commit/$CELESTIA_LOCALIZATION_REPO_COMMIT >> release-notes-resources.txt
          echo https://github.com/CelestiaProject/CelestiaContent/commit/$CELESTIA_CONTENT_REPO_COMMIT >> release-notes-resources.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          COMMIT=$(git ls-remote https://github.com/celestiamobile/Celestia ${{ inputs.branch }} | cut -f 1)
          gh release create ${{ env.TAG }} \
            --repo celestiamobile/Celestia \
            --target $COMMIT \
            --title "${{ env.VERSION }}" \
            --notes-file release-notes-resources.txt \
            --draft \
            $RUNNER_TEMP/CelestiaResources${{ env.VERSION }}.zip

