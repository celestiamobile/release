# Required secrets:
#   GH_PAT  - GitHub PAT to download artifacts and create releases

name: GitHub Release (UWP)

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'CelestiaUWP build run ID (leave empty for latest)'
        required: false
      branch:
        description: 'Branch'
        required: true
        default: 'develop'

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout release
        uses: actions/checkout@v4

      - name: Resolve Run ID
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "${{ inputs.run_id }}" ]; then
            echo "RESOLVED_RUN_ID=${{ inputs.run_id }}" >> $GITHUB_ENV
          else
            RUN_ID=$(gh api "repos/celestiamobile/CelestiaUWP/actions/workflows/build.yml/runs?branch=${{ inputs.branch }}&status=success&per_page=1" --jq '.workflow_runs[0].id')
            echo "RESOLVED_RUN_ID=$RUN_ID" >> $GITHUB_ENV
          fi

      - name: Download Sideload Build (x64)
        uses: actions/download-artifact@v4
        with:
          name: CelestiaSL-x64
          run-id: ${{ env.RESOLVED_RUN_ID }}
          repository: celestiamobile/CelestiaUWP
          github-token: ${{ secrets.GH_PAT }}
          path: '${{ runner.temp }}/CelestiaSL-x64'

      - name: Download Sideload Build (arm64)
        uses: actions/download-artifact@v4
        with:
          name: CelestiaSL-arm64
          run-id: ${{ env.RESOLVED_RUN_ID }}
          repository: celestiamobile/CelestiaUWP
          github-token: ${{ secrets.GH_PAT }}
          path: '${{ runner.temp }}/CelestiaSL-arm64'

      - name: Set Version
        run: |
          VERSION=$(ls -d $RUNNER_TEMP/CelestiaSL-arm64/CelestiaWinUI_*_ARM64_Test | head -1 | sed 's/.*CelestiaWinUI_\(.*\)_ARM64_Test/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Update Release Notes
        run: |
          CELESTIA_REPO_COMMIT=$(git ls-remote https://github.com/celestiamobile/Celestia ${{ inputs.branch }} | cut -f 1)
          CELESTIA_LOCALIZATION_REPO_COMMIT=$(git ls-remote https://github.com/celestiamobile/CelestiaLocalization ${{ inputs.branch }} | cut -f 1)
          CELESTIA_CONTENT_REPO_COMMIT=$(curl -s "https://raw.githubusercontent.com/celestiamobile/CelestiaUWP/${{ inputs.branch }}/jobs/build.yml" | awk -F"'" '/contentCommitHash/ {print $2}')
          echo https://github.com/celestiamobile/Celestia/commit/$CELESTIA_REPO_COMMIT >> release-notes-uwp.txt
          echo https://github.com/celestiamobile/CelestiaLocalization/commit/$CELESTIA_LOCALIZATION_REPO_COMMIT >> release-notes-uwp.txt
          echo https://github.com/CelestiaProject/CelestiaContent/commit/$CELESTIA_CONTENT_REPO_COMMIT >> release-notes-uwp.txt

      - name: Generate AppInstaller Files
        run: |
          python3 << 'PYEOF'
          import zipfile
          import xml.etree.ElementTree as ET
          import os
          import glob

          def esc(value):
              return value.replace('&', '&amp;').replace('<', '&lt;').replace('>', '&gt;').replace('"', '&quot;')

          def extract_identity(appx_path):
              with zipfile.ZipFile(appx_path) as z:
                  manifest = z.read('AppxManifest.xml')
              root = ET.fromstring(manifest)
              for elem in root.iter():
                  if elem.tag.endswith('}Identity') or elem.tag == 'Identity':
                      return elem.attrib
              return None

          def generate_appinstaller(arch_lower, arch_msix, deps_dir, version, latest_url, versioned_url, output_path):
              dep_entries = []
              for appx in sorted(glob.glob(os.path.join(deps_dir, '*.appx'))):
                  identity = extract_identity(appx)
                  if not identity:
                      continue
                  filename = os.path.basename(appx)
                  dep_entries.append(
                      f'    <Package\n'
                      f'      Name="{esc(identity.get("Name", ""))}"\n'
                      f'      Publisher="{esc(identity.get("Publisher", ""))}"\n'
                      f'      Version="{esc(identity.get("Version", ""))}"\n'
                      f'      ProcessorArchitecture="{esc(identity.get("ProcessorArchitecture", arch_lower))}"\n'
                      f'      Uri="{esc(versioned_url)}/{esc(filename)}" />'
                  )
              deps_xml = '\n'.join(dep_entries)

              xml_content = (
                  f'<?xml version="1.0" encoding="utf-8"?>\n'
                  f'<AppInstaller\n'
                  f'  Uri="{esc(latest_url)}/CelestiaWinUI_{esc(arch_lower)}.appinstaller"\n'
                  f'  Version="{esc(version)}"\n'
                  f'  xmlns="http://schemas.microsoft.com/appx/appinstaller/2017/2">\n'
                  f'  <MainPackage\n'
                  f'    Name="40507LinfengLi.Celestia"\n'
                  f'    Version="{esc(version)}"\n'
                  f'    Publisher="CN=DFAB6BEB-215D-4D28-AB17-B4B02709A980"\n'
                  f'    Uri="{esc(versioned_url)}/CelestiaWinUI_{esc(version)}_{esc(arch_msix)}.msix"\n'
                  f'    ProcessorArchitecture="{esc(arch_lower)}" />\n'
                  f'  <Dependencies>\n'
                  f'{deps_xml}\n'
                  f'  </Dependencies>\n'
                  f'  <UpdateSettings>\n'
                  f'    <OnLaunch HoursBetweenUpdateChecks="0" />\n'
                  f'  </UpdateSettings>\n'
                  f'</AppInstaller>\n'
              )

              with open(output_path, 'w', encoding='utf-8') as f:
                  f.write(xml_content)

          version = os.environ['VERSION']
          runner_temp = os.environ['RUNNER_TEMP']
          latest_url = 'https://github.com/celestiamobile/CelestiaUWP/releases/latest/download'
          versioned_url = f'https://github.com/celestiamobile/CelestiaUWP/releases/download/{version}'

          generate_appinstaller(
              'x64', 'x64',
              f'{runner_temp}/CelestiaSL-x64/CelestiaWinUI_{version}_x64_Test/Dependencies/x64',
              version, latest_url, versioned_url,
              f'{runner_temp}/CelestiaWinUI_x64.appinstaller'
          )

          generate_appinstaller(
              'arm64', 'ARM64',
              f'{runner_temp}/CelestiaSL-arm64/CelestiaWinUI_{version}_ARM64_Test/Dependencies/ARM64',
              version, latest_url, versioned_url,
              f'{runner_temp}/CelestiaWinUI_arm64.appinstaller'
          )
          PYEOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          COMMIT=$(git ls-remote https://github.com/celestiamobile/CelestiaUWP ${{ inputs.branch }} | cut -f 1)
          gh release create ${{ env.VERSION }} \
            --repo celestiamobile/CelestiaUWP \
            --target $COMMIT \
            --title "${{ env.VERSION }}" \
            --notes-file release-notes-uwp.txt \
            --draft \
            $RUNNER_TEMP/CelestiaWinUI_x64.appinstaller \
            $RUNNER_TEMP/CelestiaWinUI_arm64.appinstaller \
            $RUNNER_TEMP/CelestiaSL-x64/CelestiaWinUI_${{ env.VERSION }}_x64_Test/CelestiaWinUI_${{ env.VERSION }}_x64.msix \
            $RUNNER_TEMP/CelestiaSL-arm64/CelestiaWinUI_${{ env.VERSION }}_ARM64_Test/CelestiaWinUI_${{ env.VERSION }}_ARM64.msix \
            $RUNNER_TEMP/CelestiaSL-x64/CelestiaWinUI_${{ env.VERSION }}_x64_Test/Dependencies/x64/* \
            $RUNNER_TEMP/CelestiaSL-arm64/CelestiaWinUI_${{ env.VERSION }}_ARM64_Test/Dependencies/ARM64/*

