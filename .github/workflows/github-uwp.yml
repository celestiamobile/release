# Required secrets:
#   GH_PAT  - GitHub PAT to download artifacts and create releases

name: GitHub Release (UWP)

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'CelestiaUWP build run ID (leave empty for latest)'
        required: false
      branch:
        description: 'Branch'
        required: true
        default: 'develop'

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout release
        uses: actions/checkout@v4

      - name: Resolve Run ID
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "${{ inputs.run_id }}" ]; then
            echo "RESOLVED_RUN_ID=${{ inputs.run_id }}" >> $GITHUB_ENV
          else
            RUN_ID=$(gh api "repos/celestiamobile/CelestiaUWP/actions/workflows/build.yml/runs?branch=${{ inputs.branch }}&status=success&per_page=1" --jq '.workflow_runs[0].id')
            echo "RESOLVED_RUN_ID=$RUN_ID" >> $GITHUB_ENV
          fi

      - name: Download Sideload Build (x64)
        uses: actions/download-artifact@v4
        with:
          name: CelestiaSL-x64
          run-id: ${{ env.RESOLVED_RUN_ID }}
          repository: celestiamobile/CelestiaUWP
          github-token: ${{ secrets.GH_PAT }}
          path: '${{ runner.temp }}/CelestiaSL-x64'

      - name: Download Sideload Build (arm64)
        uses: actions/download-artifact@v4
        with:
          name: CelestiaSL-arm64
          run-id: ${{ env.RESOLVED_RUN_ID }}
          repository: celestiamobile/CelestiaUWP
          github-token: ${{ secrets.GH_PAT }}
          path: '${{ runner.temp }}/CelestiaSL-arm64'

      - name: Set Version
        run: |
          VERSION=$(ls -d $RUNNER_TEMP/CelestiaSL-arm64/CelestiaWinUI_*_ARM64_Test | head -1 | sed 's/.*CelestiaWinUI_\(.*\)_ARM64_Test/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Update Release Notes
        run: |
          CELESTIA_REPO_COMMIT=$(git ls-remote https://github.com/celestiamobile/Celestia ${{ inputs.branch }} | cut -f 1)
          CELESTIA_LOCALIZATION_REPO_COMMIT=$(git ls-remote https://github.com/celestiamobile/CelestiaLocalization ${{ inputs.branch }} | cut -f 1)
          CELESTIA_CONTENT_REPO_COMMIT=$(curl -s "https://raw.githubusercontent.com/celestiamobile/CelestiaUWP/${{ inputs.branch }}/jobs/build.yml" | awk -F"'" '/contentCommitHash/ {print $2}')
          echo https://github.com/celestiamobile/Celestia/commit/$CELESTIA_REPO_COMMIT >> release-notes-uwp.txt
          echo https://github.com/celestiamobile/CelestiaLocalization/commit/$CELESTIA_LOCALIZATION_REPO_COMMIT >> release-notes-uwp.txt
          echo https://github.com/CelestiaProject/CelestiaContent/commit/$CELESTIA_CONTENT_REPO_COMMIT >> release-notes-uwp.txt

      - name: Generate AppInstaller Files
        run: |
          LATEST_URL="https://github.com/celestiamobile/CelestiaUWP/releases/latest/download"
          VERSIONED_URL="https://github.com/celestiamobile/CelestiaUWP/releases/download/${{ env.VERSION }}"
          cat > $RUNNER_TEMP/CelestiaWinUI_x64.appinstaller << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <AppInstaller
            Uri="LATEST_URL_PLACEHOLDER/CelestiaWinUI_x64.appinstaller"
            Version="VERSION_PLACEHOLDER"
            xmlns="http://schemas.microsoft.com/appx/appinstaller/2017/2">
            <MainPackage
              Name="40507LinfengLi.Celestia"
              Version="VERSION_PLACEHOLDER"
              Publisher="CN=DFAB6BEB-215D-4D28-AB17-B4B02709A980"
              Uri="VERSIONED_URL_PLACEHOLDER/CelestiaWinUI_VERSION_PLACEHOLDER_x64.msix"
              ProcessorArchitecture="x64" />
            <Dependencies>
              <Package
                Name="Microsoft.VCLibs.140.00"
                Publisher="CN=Microsoft Corporation, O=Microsoft Corporation, L=Redmond, S=Washington, C=US"
                Version="14.0.33519.0"
                ProcessorArchitecture="x64"
                Uri="VERSIONED_URL_PLACEHOLDER/Microsoft.VCLibs.x64.14.00.appx" />
              <Package
                Name="Microsoft.VCLibs.140.00.UWPDesktop"
                Publisher="CN=Microsoft Corporation, O=Microsoft Corporation, L=Redmond, S=Washington, C=US"
                Version="14.0.33728.0"
                ProcessorArchitecture="x64"
                Uri="VERSIONED_URL_PLACEHOLDER/Microsoft.VCLibs.x64.14.00.Desktop.appx" />
            </Dependencies>
            <UpdateSettings>
              <OnLaunch HoursBetweenUpdateChecks="0" />
            </UpdateSettings>
          </AppInstaller>
          EOF
          sed -i "s|VERSION_PLACEHOLDER|${{ env.VERSION }}|g; s|LATEST_URL_PLACEHOLDER|${LATEST_URL}|g; s|VERSIONED_URL_PLACEHOLDER|${VERSIONED_URL}|g" \
            $RUNNER_TEMP/CelestiaWinUI_x64.appinstaller

          cat > $RUNNER_TEMP/CelestiaWinUI_arm64.appinstaller << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <AppInstaller
            Uri="LATEST_URL_PLACEHOLDER/CelestiaWinUI_arm64.appinstaller"
            Version="VERSION_PLACEHOLDER"
            xmlns="http://schemas.microsoft.com/appx/appinstaller/2017/2">
            <MainPackage
              Name="40507LinfengLi.Celestia"
              Version="VERSION_PLACEHOLDER"
              Publisher="CN=DFAB6BEB-215D-4D28-AB17-B4B02709A980"
              Uri="VERSIONED_URL_PLACEHOLDER/CelestiaWinUI_VERSION_PLACEHOLDER_ARM64.msix"
              ProcessorArchitecture="arm64" />
            <Dependencies>
              <Package
                Name="Microsoft.VCLibs.140.00"
                Publisher="CN=Microsoft Corporation, O=Microsoft Corporation, L=Redmond, S=Washington, C=US"
                Version="14.0.33519.0"
                ProcessorArchitecture="arm64"
                Uri="VERSIONED_URL_PLACEHOLDER/Microsoft.VCLibs.ARM64.14.00.appx" />
              <Package
                Name="Microsoft.VCLibs.140.00.UWPDesktop"
                Publisher="CN=Microsoft Corporation, O=Microsoft Corporation, L=Redmond, S=Washington, C=US"
                Version="14.0.33728.0"
                ProcessorArchitecture="arm64"
                Uri="VERSIONED_URL_PLACEHOLDER/Microsoft.VCLibs.ARM64.14.00.Desktop.appx" />
            </Dependencies>
            <UpdateSettings>
              <OnLaunch HoursBetweenUpdateChecks="0" />
            </UpdateSettings>
          </AppInstaller>
          EOF
          sed -i "s|VERSION_PLACEHOLDER|${{ env.VERSION }}|g; s|LATEST_URL_PLACEHOLDER|${LATEST_URL}|g; s|VERSIONED_URL_PLACEHOLDER|${VERSIONED_URL}|g" \
            $RUNNER_TEMP/CelestiaWinUI_arm64.appinstaller

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          COMMIT=$(git ls-remote https://github.com/celestiamobile/CelestiaUWP ${{ inputs.branch }} | cut -f 1)
          gh release create ${{ env.VERSION }} \
            --repo celestiamobile/CelestiaUWP \
            --target $COMMIT \
            --title "${{ env.VERSION }}" \
            --notes-file release-notes-uwp.txt \
            --draft \
            $RUNNER_TEMP/CelestiaWinUI_x64.appinstaller \
            $RUNNER_TEMP/CelestiaWinUI_arm64.appinstaller \
            $RUNNER_TEMP/CelestiaSL-x64/CelestiaWinUI_${{ env.VERSION }}_x64_Test/CelestiaWinUI_${{ env.VERSION }}_x64.msix \
            $RUNNER_TEMP/CelestiaSL-arm64/CelestiaWinUI_${{ env.VERSION }}_ARM64_Test/CelestiaWinUI_${{ env.VERSION }}_ARM64.msix \
            $RUNNER_TEMP/CelestiaSL-x64/CelestiaWinUI_${{ env.VERSION }}_x64_Test/Dependencies/x64/* \
            $RUNNER_TEMP/CelestiaSL-arm64/CelestiaWinUI_${{ env.VERSION }}_ARM64_Test/Dependencies/ARM64/*

