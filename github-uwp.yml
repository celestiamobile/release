trigger: none

pool:
  vmImage: ubuntu-latest

steps:

- task: DownloadBuildArtifacts@1
  inputs:
    buildType: 'specific'
    project: '9f9dcde1-dcba-4537-8214-71c8a03b99a0'
    pipeline: '8'
    buildVersionToDownload: 'specific'
    buildId: '$(BUILD_ID)'
    downloadType: 'single'
    artifactName: 'CelestiaSL'
    downloadPath: '$(System.ArtifactsDirectory)'
  displayName: 'Download Sideload Build'

- task: ArchiveFiles@2
  inputs:
    rootFolderOrFile: '$(System.ArtifactsDirectory)/CelestiaSL'
    includeRootFolder: false
    archiveType: 'zip'
    archiveFile: '$(System.DefaultWorkingDirectory)/CelestiaUWP_$(RELEASE_VERSION).zip'
    replaceExistingArchive: true
  displayName: 'Create Archive'

- script: |
    CELESTIA_REPO_COMMIT=$(git ls-remote https://github.com/celestiamobile/Celestia develop | cut -f 1)
    CELESTIA_LOCALIZATION_REPO_COMMIT=$(git ls-remote https://github.com/celestiamobile/CelestiaLocalization develop | cut -f 1)
    echo https://github.com/celestiamobile/Celestia/commit/$CELESTIA_REPO_COMMIT >> release-notes-uwp.txt
    echo https://github.com/celestiamobile/CelestiaLocalization/commit/$CELESTIA_LOCALIZATION_REPO_COMMIT >> release-notes-uwp.txt
  displayName: 'Update Release Notes'

- script: |
    CELESTIA_UWP_REPO_COMMIT=$(git ls-remote https://github.com/celestiamobile/CelestiaUWP develop | cut -f 1)
    echo "##vso[task.setvariable variable=CommitHash]$CELESTIA_UWP_REPO_COMMIT"
  displayName: 'Set Commit Hash Variable'

- task: GitHubRelease@1
  inputs:
    gitHubConnection: 'GithubAuth'
    repositoryName: 'celestiamobile/CelestiaUWP'
    action: 'create'
    target: $(CommitHash)
    tagSource: 'userSpecifiedTag'
    tag: '$(RELEASE_TAG)'
    title: '$(RELEASE_VERSION)'
    releaseNotesFilePath: '$(System.DefaultWorkingDirectory)/release-notes-uwp.txt'
    isDraft: true
    addChangeLog: false
    assets: '$(System.DefaultWorkingDirectory)/CelestiaUWP_$(RELEASE_VERSION).zip'
  displayName: 'Release'