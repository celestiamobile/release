trigger: none

pool:
  vmImage: ubuntu-24.04

steps:

- task: DownloadBuildArtifacts@1
  inputs:
    buildType: 'specific'
    project: '9f9dcde1-dcba-4537-8214-71c8a03b99a0'
    pipeline: '9'
    buildVersionToDownload: 'specific'
    buildId: '$(BUILD_ID)'
    downloadType: 'single'
    artifactName: 'apk'
    downloadPath: '$(System.ArtifactsDirectory)'
  displayName: 'Download Sideload Build'

- script: |
    VERSION=$(curl -s "https://raw.githubusercontent.com/celestiamobile/AndroidCelestia/$(BRANCH)/app/src/main/AndroidManifest.xml" | awk -F'"' '/android.versionName=/ {print $2; exit}')
    echo "##vso[task.setvariable variable=Version]$VERSION"
    TAG=$(echo $VERSION | sed 's/\./_/g')_rc$(RC)
    echo "##vso[task.setvariable variable=Tag]$TAG"
  displayName: 'Set Version Variable'

- script: |
    mv $(System.ArtifactsDirectory)/apk/app-sideload-release-unsigned.apk $(System.DefaultWorkingDirectory)/celestia-$(Version)-rc$(RC).apk
  displayName: 'Rename File'

- script: |
    CELESTIA_REPO_COMMIT=$(git ls-remote https://github.com/celestiamobile/Celestia $(BRANCH) | cut -f 1)
    CELESTIA_LOCALIZATION_REPO_COMMIT=$(git ls-remote https://github.com/celestiamobile/CelestiaLocalization $(BRANCH) | cut -f 1)
    CELESTIA_CONTENT_REPO_COMMIT=$(curl -s "https://raw.githubusercontent.com/celestiamobile/CelestiaUWP/$(BRANCH)/jobs/build.yml" | awk -F"'" '/contentCommitHash/ {print $2}')
    echo https://github.com/celestiamobile/Celestia/commit/$CELESTIA_REPO_COMMIT >> release-notes-android.txt
    echo https://github.com/celestiamobile/CelestiaLocalization/commit/$CELESTIA_LOCALIZATION_REPO_COMMIT >> release-notes-android.txt
    echo https://github.com/CelestiaProject/CelestiaContent/commit/$CELESTIA_CONTENT_REPO_COMMIT >> release-notes-android.txt
  displayName: 'Update Release Notes'

- script: |
    ANDROID_CELESTIA_REPO_COMMIT=$(git ls-remote https://github.com/celestiamobile/AndroidCelestia $(BRANCH) | cut -f 1)
    echo "##vso[task.setvariable variable=CommitHash]$ANDROID_CELESTIA_REPO_COMMIT"
  displayName: 'Set Commit Hash Variable'

- task: GitHubRelease@1
  inputs:
    gitHubConnection: 'GithubAuth'
    repositoryName: 'celestiamobile/AndroidCelestia'
    action: 'create'
    target: $(CommitHash)
    tagSource: 'userSpecifiedTag'
    tag: '$(Tag)'
    title: '$(Version)'
    releaseNotesFilePath: '$(System.DefaultWorkingDirectory)/release-notes-android.txt'
    isDraft: true
    addChangeLog: false
    assets: '$(System.DefaultWorkingDirectory)/celestia-$(Version)-rc$(RC).apk'
  displayName: 'Release'